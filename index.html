<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunday</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text: #1a1a1a;
    --text-muted: rgba(30,20,0,0.55);
    --accent: #ff5757;
    --yellow: #ffde59;
    --green: #7ed957;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;

    --glass-bg: rgba(255,255,255,0.65);
    --glass-border: rgba(255,255,255,0.75);
    --glass-highlight: inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(255,255,255,0.3);
    --glass-shadow: 0 4px 24px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
    --glass-blur: blur(24px) saturate(160%);
  }

  html, body { height:100%; font-family:var(--font); color:var(--text); overflow:hidden; }

  /* ── Background ── */
  .bg { position:fixed;inset:0;background:#fffef9;z-index:0;overflow:hidden; }
  .blob { position:absolute;border-radius:50%;will-change:transform; }
  .blob-1 { width:700px;height:700px;background:radial-gradient(circle,#ffde5966,#ffde5922);filter:blur(80px);top:-15%;left:-15%;animation:drift1 18s ease-in-out infinite; }
  .blob-2 { width:550px;height:550px;background:radial-gradient(circle,#ff575733,#ff575711);filter:blur(90px);bottom:-10%;right:-10%;animation:drift2 22s ease-in-out infinite; }
  .blob-3 { width:400px;height:400px;background:radial-gradient(circle,#7ed95733,#7ed95711);filter:blur(80px);top:35%;left:35%;animation:drift3 16s ease-in-out infinite; }
  .blob-4 { width:320px;height:320px;background:radial-gradient(circle,#ffde5955,#ffde5918);filter:blur(70px);top:15%;right:15%;animation:drift4 20s ease-in-out infinite; }
  .blob-5 { width:250px;height:250px;background:radial-gradient(circle,#ff575722,#ff575708);filter:blur(70px);bottom:20%;left:20%;animation:drift5 24s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(60px,40px) scale(1.05)} 66%{transform:translate(-30px,70px) scale(0.97)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-50px,-60px) scale(1.08)} 66%{transform:translate(40px,-30px) scale(0.95)} }
  @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-80px,50px) scale(1.1)} }
  @keyframes drift4 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(50px,80px) scale(0.9)} 80%{transform:translate(-40px,30px) scale(1.05)} }
  @keyframes drift5 { 0%,100%{transform:translate(0,0) scale(1)} 60%{transform:translate(70px,-50px) scale(1.06)} }
  @media (prefers-reduced-motion: reduce) { .blob { animation:none; } }

  /* ── Glass mixin ── */
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-highlight), var(--glass-shadow);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
  }

  /* ── App shell ── */
  .app { position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center; }

  /* ── Header ── */
  header {
    width:100%;padding:16px 24px;
    display:flex;align-items:center;justify-content:center;
    position:relative;z-index:200;
  }

  .header-center { display:flex;align-items:center;gap:16px; }

  /* ── Animated status dot ── */
  .status-dot {
    position:relative;
    margin:0 10px;
    width:10px;height:10px;
    border-radius:100px;
    background:rgba(0,0,0,0.12);
    flex-shrink:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    transition:
      width  0.55s cubic-bezier(0.34,1.2,0.64,1),
      height 0.4s  cubic-bezier(0.34,1.2,0.64,1),
      background 0.35s ease;
  }
  .status-dot.online  { background:var(--green); }
  .status-dot.offline { background:var(--accent); }
  .status-dot.expanded { width:108px;height:28px; }

  .status-dot-label {
    position:absolute;
    font-size:11px;font-weight:500;letter-spacing:0.02em;
    color:rgba(255,255,255,0.95);
    white-space:nowrap;pointer-events:none;user-select:none;
    opacity:0;transform:translateX(8px);
    transition:opacity 0.16s 0.34s, transform 0.16s 0.34s;
  }
  .status-dot.expanded .status-dot-label { opacity:1;transform:translateX(0); }

  .gallery-btn {
    width:36px;height:36px;border-radius:12px;
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-muted);
    transition:color 0.15s;
  }
  .gallery-btn:hover { color:var(--accent); }
  .gallery-btn.active { color:var(--accent); }

  /* ── Model picker ── */
  .model-picker {
    position:relative;height:22px;padding:0 8px;border-radius:8px;
    display:none;align-items:center;gap:4px;
    cursor:pointer;user-select:none;margin-left:auto;
    font-size:10px;font-weight:500;color:var(--text-muted);
    transition:color 0.15s,background 0.15s;
  }
  .model-picker:hover { background:rgba(0,0,0,0.05);color:var(--text); }
  .model-picker.active { background:rgba(255,87,87,0.08);color:var(--accent); }
  .model-name { max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
  .model-dropdown {
    position:absolute;bottom:calc(100% + 6px);right:0;width:260px;
    max-height:480px;overflow-y:auto;
    background:rgba(255,255,255,0.97);
    border:1px solid rgba(255,255,255,0.9);
    border-radius:14px;padding:6px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.95),0 -4px 24px rgba(0,0,0,0.07),0 8px 32px rgba(0,0,0,0.05);
    backdrop-filter:blur(32px) saturate(160%);
    -webkit-backdrop-filter:blur(32px) saturate(160%);
    display:none;z-index:300;
  }
  .model-dropdown::-webkit-scrollbar { display:none; }
  .model-dropdown.open { display:block; }
  .model-section-label {
    font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--text-muted);padding:6px 10px 3px;
  }
  .model-section-divider { height:1px;background:rgba(0,0,0,0.06);margin:4px 2px; }
  .model-option {
    padding:8px 10px;border-radius:8px;
    font-size:12px;color:var(--text);cursor:pointer;
    transition:background 0.1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .model-option:hover { background:rgba(0,0,0,0.05); }
  .model-option.active { color:var(--accent);font-weight:500; }
  .model-pull-row { display:flex;gap:4px;padding:3px 4px; }
  .model-pull-input {
    flex:1;background:rgba(0,0,0,0.04);border:1px solid transparent;
    border-radius:7px;padding:5px 8px;font-size:11px;font-family:var(--font);
    color:var(--text);outline:none;transition:border-color 0.15s,background 0.15s;
    min-width:0;
  }
  .model-pull-input:focus { border-color:rgba(255,87,87,0.3);background:rgba(255,255,255,0.9); }
  .model-pull-input::placeholder { color:var(--text-muted);opacity:0.6; }
  .model-pull-btn {
    padding:0 10px;border-radius:7px;border:none;flex-shrink:0;
    background:rgba(255,87,87,0.1);color:var(--accent);
    font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer;
    transition:background 0.15s;
  }
  .model-pull-btn:hover { background:rgba(255,87,87,0.18); }
  .model-pull-btn:disabled { opacity:0.4;cursor:default; }
  .model-browse-toggle {
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 10px;border-radius:8px;
    font-size:11px;color:var(--text-muted);cursor:pointer;
    transition:background 0.1s,color 0.1s;
  }
  .model-browse-toggle:hover { background:rgba(0,0,0,0.04);color:var(--text); }
  .model-browse-toggle svg { transition:transform 0.2s; }
  .model-library-item {
    display:flex;align-items:center;gap:6px;
    padding:7px 8px;border-radius:8px;
    transition:background 0.1s;
  }
  .model-library-item:hover { background:rgba(0,0,0,0.04); }
  .model-library-item.pulling { opacity:0.5;pointer-events:none; }
  .model-library-info { flex:1;min-width:0; }
  .model-library-name { font-size:12px;font-weight:500;color:var(--text); }
  .model-library-desc { font-size:10px;color:var(--text-muted);margin-top:1px; }
  .model-library-size { font-size:10px;color:var(--text-muted);flex-shrink:0;white-space:nowrap; }
  .model-library-pull-btn {
    width:22px;height:22px;border-radius:6px;border:none;flex-shrink:0;
    background:rgba(255,87,87,0.08);color:var(--accent);
    font-size:13px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.15s;
  }
  .model-library-pull-btn:hover { background:rgba(255,87,87,0.16); }
  .model-library-pull-btn:disabled { opacity:0.35;cursor:default;color:var(--green); }
  .model-pull-progress {
    padding:8px 10px 4px;border-top:1px solid rgba(0,0,0,0.05);margin-top:2px;
  }
  .model-pull-status { font-size:11px;color:var(--text-muted);margin-bottom:5px; }
  .model-pull-bar { height:3px;background:rgba(0,0,0,0.06);border-radius:2px;overflow:hidden; }
  .model-pull-bar-fill { height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;width:0%; }

  /* ── Gallery overlay (3D carousel) ── */
  .gallery-overlay {
    position:fixed;top:0;left:0;right:0;z-index:150;
    background:rgba(255,254,248,0.82);
    backdrop-filter:blur(40px) saturate(160%);
    -webkit-backdrop-filter:blur(40px) saturate(160%);
    border-bottom:1px solid rgba(255,255,255,0.7);
    box-shadow:0 8px 48px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.95);
    height:340px;
    transform:translateY(-100%);
    pointer-events:none;
    transition:transform 0.45s cubic-bezier(0.34,1.4,0.64,1);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .gallery-overlay.open { transform:translateY(0); pointer-events:all; }

  .gallery-title { font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:28px; }

  /* ── Carousel ── */
  .carousel-scene { width:100%;height:180px;perspective:900px;display:flex;align-items:center;justify-content:center;cursor:grab;user-select:none; }
  .carousel-scene:active { cursor:grabbing; }
  .carousel-ring { width:140px;height:100px;position:relative;transform-style:preserve-3d; }

  .carousel-card {
    position:absolute;width:130px;height:90px;top:0;left:0;
    background:rgba(255,255,255,0.55);
    border:1px solid rgba(255,255,255,0.6);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(255,255,255,0.2), 0 4px 20px rgba(0,0,0,0.07);
    backdrop-filter:blur(16px) saturate(160%);
    -webkit-backdrop-filter:blur(16px) saturate(160%);
    border-radius:14px;
    padding:12px;display:flex;flex-direction:column;gap:4px;
    cursor:pointer;overflow:hidden;transition:box-shadow 0.2s;
  }
  .carousel-card:hover { box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 4px 28px rgba(255,87,87,0.18); }
  .card-date { font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent); }
  .card-preview { font-size:11px;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;opacity:0.7; }
  .card-delete { position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(255,87,87,0.15);color:#ff5757;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s; }
  .carousel-card:hover .card-delete { opacity:1; }
  .carousel-empty { font-size:13px;color:var(--text-muted); }
  .gallery-hint { margin-top:20px;font-size:11px;color:var(--text-muted);opacity:0.5; }

  /* ── History panel ── */
  .history-panel {
    position:fixed;top:0;left:0;bottom:0;z-index:160;
    width:300px;
    background:rgba(255,254,248,0.88);
    backdrop-filter:blur(40px) saturate(160%);
    -webkit-backdrop-filter:blur(40px) saturate(160%);
    border-right:1px solid rgba(255,255,255,0.7);
    box-shadow:8px 0 48px rgba(0,0,0,0.05), inset -1px 0 0 rgba(255,255,255,0.5);
    transform:translateX(-100%);
    pointer-events:none;
    transition:transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  .history-panel.open { transform:translateX(0); pointer-events:all; }

  .history-header {
    padding:20px 20px 16px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid rgba(0,0,0,0.06);
    flex-shrink:0;
  }
  .history-header-title {
    font-size:11px;font-weight:600;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--text-muted);
  }
  .history-close {
    width:28px;height:28px;border-radius:8px;border:none;
    background:rgba(0,0,0,0.04);color:var(--text-muted);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:14px;transition:background 0.15s,color 0.15s;
  }
  .history-close:hover { background:rgba(255,87,87,0.1);color:var(--accent); }

  .history-list { flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px; }
  .history-list::-webkit-scrollbar { display:none; }

  .history-item {
    padding:12px 14px;border-radius:12px;cursor:pointer;
    border:1px solid transparent;
    transition:background 0.15s,border-color 0.15s;
    display:flex;flex-direction:column;gap:4px;
  }
  .history-item:hover {
    background:rgba(255,255,255,0.7);
    border-color:rgba(255,255,255,0.8);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 2px 12px rgba(0,0,0,0.04);
  }
  .history-item-date {
    font-size:9px;font-weight:600;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--accent);
  }
  .history-item-title {
    font-size:13px;font-weight:500;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .history-item-time {
    font-size:10px;color:var(--text-muted);
  }
  .history-item { position:relative; }
  .history-item-actions {
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    display:flex;gap:4px;opacity:0;transition:opacity 0.15s;
  }
  .history-item:hover .history-item-actions { opacity:1; }
  .history-action-btn {
    width:24px;height:24px;border-radius:7px;border:none;
    background:rgba(0,0,0,0.05);color:var(--text-muted);
    cursor:pointer;font-size:12px;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.15s,color 0.15s;flex-shrink:0;
  }
  .history-action-btn:hover { background:rgba(255,87,87,0.12);color:var(--accent); }
  .rename-input {
    background:none;border:none;border-bottom:1px solid var(--accent);
    outline:none;font-size:13px;font-weight:500;color:var(--text);
    font-family:var(--font);width:100%;padding:0;
  }
  .canvas-card-action-btn {
    width:22px;height:22px;border-radius:6px;border:none;
    background:rgba(0,0,0,0.05);color:var(--text-muted);
    cursor:pointer;font-size:11px;
    display:flex;align-items:center;justify-content:center;
    transition:background 0.15s,color 0.15s;flex-shrink:0;
  }
  .canvas-card-action-btn:hover { background:rgba(255,87,87,0.12);color:var(--accent); }

  .history-empty {
    padding:32px 16px;text-align:center;font-size:13px;color:var(--text-muted);
  }

  /* ── Canvas overlay ── */
  .canvas-overlay {
    position:fixed;inset:0;z-index:140;
    background-color:#fffef9;
    background-image: radial-gradient(circle, rgba(30,20,0,0.18) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity:0;pointer-events:none;
    transition:opacity 0.35s ease;
    overflow:hidden;
  }
  .canvas-overlay.open { opacity:1;pointer-events:all; }

  .canvas-toolbar {
    position:absolute;top:16px;left:50%;transform:translateX(-50%);
    z-index:10;display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,0.72);
    border:1px solid rgba(255,255,255,0.85);
    border-radius:20px;padding:8px 16px;
    backdrop-filter:blur(32px) saturate(160%);
    -webkit-backdrop-filter:blur(32px) saturate(160%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.95),0 4px 24px rgba(0,0,0,0.05);
    white-space:nowrap;
  }
  .canvas-toolbar-title {
    font-size:11px;font-weight:600;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--text-muted);
  }
  .canvas-divider { width:1px;height:16px;background:rgba(0,0,0,0.08); }
  .canvas-tool-btn {
    height:28px;padding:0 12px;border-radius:8px;border:none;
    font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer;
    display:flex;align-items:center;gap:5px;
    transition:background 0.15s,color 0.15s,box-shadow 0.15s;
    color:var(--text-muted);background:transparent;
  }
  .canvas-tool-btn:hover { background:rgba(255,87,87,0.08);color:var(--accent); }
  .canvas-tool-btn.active {
    background:rgba(255,87,87,0.1);color:var(--accent);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .canvas-hint {
    font-size:10px;color:var(--text-muted);opacity:0.6;
    pointer-events:none;
  }

  .canvas-world {
    position:absolute;top:0;left:0;
    width:6000px;height:6000px;
    transform-origin:0 0;
    cursor:grab;
  }
  .canvas-world.panning { cursor:grabbing; }
  .canvas-world.connecting { cursor:crosshair; }

  .canvas-svg {
    position:absolute;top:0;left:0;
    width:6000px;height:6000px;
    pointer-events:none;overflow:visible;
  }
  .canvas-svg .conn-delete { pointer-events:all;cursor:pointer; }

  .canvas-card {
    position:absolute;width:210px;
    background:rgba(255,255,255,0.62);
    border:1px solid rgba(255,255,255,0.72);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.95),0 4px 24px rgba(0,0,0,0.07);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-radius:16px;padding:14px;
    cursor:grab;user-select:none;
    display:flex;flex-direction:column;gap:6px;
    transition:box-shadow 0.2s,border-color 0.2s,transform 0.1s;
  }
  .canvas-card:hover {
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.95),0 8px 32px rgba(255,87,87,0.15);
    border-color:rgba(255,87,87,0.2);
  }
  .canvas-card.dragging {
    cursor:grabbing;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 16px 48px rgba(0,0,0,0.12);
    transform:scale(1.03);
    z-index:100;
  }
  .canvas-card.connect-source {
    border-color:rgba(255,87,87,0.5);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.9),0 0 0 2px rgba(255,87,87,0.25),0 8px 32px rgba(255,87,87,0.2);
  }
  .canvas-card-date {
    font-size:9px;font-weight:600;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--accent);
  }
  .canvas-card-title {
    font-size:13px;font-weight:500;color:var(--text);line-height:1.4;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }
  .canvas-card-preview {
    font-size:11px;color:var(--text-muted);line-height:1.5;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    flex:1;
  }
  .canvas-card-footer {
    display:flex;align-items:center;justify-content:space-between;
    padding-top:6px;border-top:1px solid rgba(0,0,0,0.05);
  }
  .canvas-card-open {
    font-size:10px;color:var(--text-muted);background:none;border:none;
    cursor:pointer;padding:0;font-family:var(--font);
    transition:color 0.15s;
  }
  .canvas-card-open:hover { color:var(--accent); }
  .canvas-card-tag {
    font-size:9px;color:var(--text-muted);opacity:0.5;
    background:rgba(0,0,0,0.04);padding:2px 6px;border-radius:6px;
  }
  .canvas-empty {
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:14px;color:var(--text-muted);text-align:center;pointer-events:none;
  }

  /* ── Chat area ── */
  .chat-area { flex:1;min-height:0;width:100%;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:0 max(24px, 6%) 160px; }
  .chat-area::-webkit-scrollbar { display:none; }

  /* ── Welcome ── */
  .welcome { min-height:calc(100vh - 180px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 0 40px;gap:8px; }
  .welcome-greeting { font-size:34px;font-weight:300;color:var(--text);letter-spacing:-0.02em; }
  .welcome-greeting strong { font-weight:600; }
  
  .welcome-sub { font-size:15px;color:var(--text-muted);font-weight:300;margin-top:4px; }

  .suggestions { display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:32px;max-width:560px; }
  .suggestion {
    padding:9px 18px;border-radius:20px;
    font-size:13px;color:var(--text-muted);cursor:pointer;
    font-family:var(--font);
    transition:color 0.15s, box-shadow 0.15s;
  }
  .suggestion:hover { color:var(--accent);box-shadow:var(--glass-highlight),0 4px 20px rgba(255,87,87,0.1); }

  /* ── Messages ── */
  .messages { display:flex;flex-direction:column;gap:20px;padding-top:32px; }
  .message { display:flex;flex-direction:column;gap:6px;max-width:100%; }
  .message.user { align-items:flex-end; }
  .message.assistant { align-items:flex-start; }

  /* ── Markdown ── */
  .bubble p { margin:0 0 8px; } .bubble p:last-child { margin-bottom:0; }
  .bubble h1,.bubble h2,.bubble h3 { font-weight:600;margin:12px 0 6px;line-height:1.3; }
  .bubble h1 { font-size:16px; } .bubble h2 { font-size:15px; } .bubble h3 { font-size:14px; }
  .bubble ul,.bubble ol { padding-left:20px;margin:6px 0; } .bubble li { margin:3px 0; }
  .bubble code { font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px; }
  .bubble pre { background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.07);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto; }
  .bubble pre code { background:none;padding:0;font-size:12px; }
  .bubble strong { font-weight:600; } .bubble em { font-style:italic; }
  .bubble blockquote { border-left:3px solid rgba(0,0,0,0.15);margin:8px 0;padding:4px 12px;color:var(--text-muted); }
  .bubble a { color:var(--accent);text-decoration:none; } .bubble a:hover { text-decoration:underline; }
  .bubble hr { border:none;border-top:1px solid rgba(0,0,0,0.08);margin:10px 0; }

  .msg-label { font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);padding:0 4px; }
  .message.user .msg-label { color:var(--accent);opacity:0.8; }

  .bubble {
    padding:13px 18px;border-radius:18px;
    font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;
    max-width:88%;
  }
  .message.user .bubble {
    background:rgba(255,222,89,0.18);
    border:1px solid rgba(255,222,89,0.35);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 12px rgba(255,222,89,0.08);
    backdrop-filter:blur(20px) saturate(140%);
    -webkit-backdrop-filter:blur(20px) saturate(140%);
  }
  .message.assistant .bubble {
    background:rgba(255,255,255,0.7);
    border:1px solid rgba(255,255,255,0.8);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.95), var(--glass-shadow);
    backdrop-filter:var(--glass-blur);
    -webkit-backdrop-filter:var(--glass-blur);
  }

  .save-row { display:flex;align-items:center;gap:8px;padding:0 4px; }
  .tag-field { background:transparent;border:none;border-bottom:1px solid rgba(0,0,0,0.1);color:var(--text-muted);font-size:11px;font-family:var(--font);padding:3px 2px;outline:none;width:160px;transition:border-color 0.15s; }
  .tag-field::placeholder { color:var(--text-muted);opacity:0.5; }
  .tag-field:focus { border-bottom-color:var(--accent);color:var(--text); }
  .save-btn { font-size:11px;font-family:var(--font);font-weight:500;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:2px 0;transition:color 0.15s; }
  .save-btn:hover { color:var(--accent); }
  .save-btn.saved { color:var(--green);cursor:default; }

  /* ── Thinking ── */
  .thinking {
    align-self:flex-start;display:flex;align-items:center;gap:10px;
    padding:12px 18px;border-radius:18px;
    background:rgba(255,255,255,0.22);
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.75), var(--glass-shadow);
    backdrop-filter:var(--glass-blur);
    -webkit-backdrop-filter:var(--glass-blur);
    font-size:13px;color:var(--text-muted);
  }
  .dots span { display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--text-muted);margin:0 1px;animation:pulse 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay:0.2s; }
  .dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  /* ── Mode selector ── */
  .mode-row { display:flex;gap:4px;justify-content:center;padding:2px 0 4px; }
  .mode-pill {
    height:22px;padding:0 10px;border-radius:8px;border:none;
    font-size:10px;font-family:var(--font);font-weight:500;
    letter-spacing:0.04em;cursor:pointer;
    color:var(--text-muted);background:transparent;
    transition:background 0.15s,color 0.15s;
  }
  .mode-pill:hover { background:rgba(0,0,0,0.05);color:var(--text); }
  .mode-pill.active { background:rgba(255,87,87,0.1);color:var(--accent); }
  .mode-pill.skill.active { background:rgba(255,222,89,0.18);color:rgba(180,140,0,0.9); }
  .mode-divider { width:1px;height:14px;background:rgba(0,0,0,0.08);margin:0 2px;flex-shrink:0; }
  .input-bar { display:flex;align-items:flex-end;gap:8px;padding:0 6px 6px; }

  /* ── History search ── */
  .history-search { padding:8px 12px 4px;flex-shrink:0; }
  .history-search-input {
    width:100%;background:rgba(0,0,0,0.04);
    border:1px solid transparent;border-radius:10px;
    padding:7px 12px;font-size:13px;font-family:var(--font);
    color:var(--text);outline:none;
    transition:border-color 0.15s,background 0.15s;
  }
  .history-search-input:focus { background:rgba(255,255,255,0.8);border-color:rgba(255,87,87,0.3); }
  .history-search-input::placeholder { color:var(--text-muted);opacity:0.6; }
  .history-item-snippet {
    font-size:11px;color:var(--text-muted);line-height:1.4;margin-top:2px;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }

  /* ── Input bar ── */
  .input-wrap { position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;padding:16px max(16px, 5%) 28px;pointer-events:none; }
  .input-card {
    width:100%;max-width:none;
    background:rgba(255,255,255,0.72);
    border:1px solid rgba(255,255,255,0.85);
    border-radius:22px;
    backdrop-filter:blur(32px) saturate(160%);
    -webkit-backdrop-filter:blur(32px) saturate(160%);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.95), 0 8px 32px rgba(0,0,0,0.05);
    display:flex;flex-direction:column;padding:6px 6px 6px 6px;
    pointer-events:all;transition:border-color 0.2s,box-shadow 0.2s;
  }
  .input-card:focus-within {
    border-color:rgba(255,87,87,0.35);
    box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.85), 0 8px 48px rgba(255,87,87,0.12);
  }
  #promptInput { flex:1;background:none;border:none;outline:none;font-size:14px;font-family:var(--font);color:var(--text);resize:none;line-height:1.6;min-height:24px;max-height:140px;padding:2px 0; }
  #promptInput::placeholder { color:var(--text-muted); }

  .send-btn {
    width:36px;height:36px;border-radius:12px;border:none;
    background:linear-gradient(145deg,#ff7070,#ff5757);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.3), 0 2px 8px rgba(255,87,87,0.3);
    color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:opacity 0.15s,transform 0.1s;
  }
  .send-btn:hover:not(:disabled) { opacity:0.88;transform:scale(1.05); }
  .send-btn:disabled { opacity:0.3;cursor:default; }
</style>
<script src="/marked.min.js"></script>
<script src="/purify.min.js"></script>
</head>
<body>

<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
</div>

<!-- History panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-header-title">History</span>
    <button class="history-close" onclick="toggleHistory()">✕</button>
  </div>
  <div class="history-search">
    <input class="history-search-input" id="historySearchInput" type="text" placeholder="Search notes…" oninput="handleHistorySearch(this.value)" autocomplete="off">
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">No sessions yet</div>
  </div>
</div>

<!-- Canvas overlay -->
<div class="canvas-overlay" id="canvasOverlay">
  <div class="canvas-toolbar">
    <span class="canvas-toolbar-title">Canvas</span>
    <div class="canvas-divider"></div>
    <button class="canvas-tool-btn" id="connectBtn" onclick="toggleConnectMode()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="2" cy="2" r="1.5" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="10" cy="10" r="1.5" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="10" cy="2" r="1.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="3.2" y1="2.8" x2="8.8" y2="9.2" stroke="currentColor" stroke-width="1.2"/>
        <line x1="3.2" y1="2" x2="8.8" y2="2" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      Connect
    </button>
    <button class="canvas-tool-btn" onclick="fitCanvasView()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Fit
    </button>
    <div class="canvas-divider"></div>
    <span class="canvas-hint">Drag cards · Scroll to zoom · Drag background to pan</span>
    <div class="canvas-divider"></div>
    <button class="canvas-tool-btn" onclick="toggleCanvas()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Close
    </button>
  </div>
  <div class="canvas-world" id="canvasWorld">
    <svg class="canvas-svg" id="canvasSvg"></svg>
  </div>
</div>

<!-- Gallery overlay (3D carousel) -->
<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-title">Saved notes</div>
  <div class="carousel-scene" id="carouselScene">
    <div class="carousel-ring" id="carouselRing">
      <div class="carousel-empty">No notes yet</div>
    </div>
  </div>
  <div class="gallery-hint">drag to spin</div>
</div>

<div class="app">
  <header>
    <div class="header-center">
      <button class="gallery-btn glass" id="historyBtn" onclick="toggleHistory()" title="Chat history">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/>
          <path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <!-- Canvas -->
      <button class="gallery-btn glass" id="canvasBtn" onclick="toggleCanvas()" title="Canvas view">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <circle cx="3" cy="3" r="2" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="13" cy="3" r="2" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="8" cy="13" r="2" stroke="currentColor" stroke-width="1.3"/>
          <line x1="4.8" y1="3.8" x2="11.2" y2="3.8" stroke="currentColor" stroke-width="1.2"/>
          <line x1="3.8" y1="4.8" x2="7.3" y2="11.3" stroke="currentColor" stroke-width="1.2"/>
          <line x1="12.2" y1="4.8" x2="8.7" y2="11.3" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
      <!-- Status dot — sits between the two button pairs -->
      <div class="status-dot" id="statusDot">
        <span class="status-dot-label" id="statusText"></span>
      </div>
      <!-- Gallery -->
      <button class="gallery-btn glass" id="galleryBtn" onclick="toggleGallery()" title="Notes gallery">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
          <rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
      <button class="gallery-btn glass" onclick="newChat()" title="New chat">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <!-- Status dot — fixed to top-center, expands on connect -->
    </div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-greeting">Good <span id="timeGreeting"></span></div>
      <div class="welcome-sub">What's on your mind today?</div>
      <div class="suggestions">
        <button class="suggestion glass" onclick="fillPrompt('Give me an unexpected angle on an idea I'm stuck on')">Unstick an idea</button>
        <button class="suggestion glass" onclick="fillPrompt('What creative project should I start this week?')">Weekend creative project</button>
        <button class="suggestion glass" onclick="fillPrompt('Challenge an assumption I probably have about my work')">Challenge an assumption</button>
        <button class="suggestion glass" onclick="fillPrompt('What's a concept worth understanding deeply right now?')">Something worth learning</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
  </div>

  <div class="input-wrap">
    <div class="input-card">
      <div class="input-bar">
        <textarea id="promptInput" placeholder="Ask anything…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendPrompt()" title="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 13V3M3 8l5-5 5 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="mode-row">
        <button class="mode-pill active" data-mode="free" onclick="setMode('free')">free</button>
        <button class="mode-pill" data-mode="riff" onclick="setMode('riff')">riff</button>
        <button class="mode-pill" data-mode="stuck" onclick="setMode('stuck')">stuck</button>
        <button class="mode-pill" data-mode="critique" onclick="setMode('critique')">critique</button>
        <div class="model-picker" id="modelPicker" onclick="toggleModelPicker()">
          <span class="model-name" id="modelName">model</span>
          <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div class="model-dropdown" id="modelDropdown"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = ''
  let lastPrompt = '', lastResponse = ''
  let galleryOpen = false, historyOpen = false, canvasOpen = false
  let conversationHistory = []
  let sessionFilename = null
  let currentMode = 'free'
  let currentSkillPrompt = ''  // set when a skill pill is active
  let currentModel = ''        // empty = server default; populated after loadModels()
  let pastContext = ''

  // DOMPurify is downloaded by setup.sh alongside marked.min.js.
  // If it somehow failed to load, fall back to stripping script tags rather than crashing.
  function safeHtml(markdown) {
    const html = marked.parse(markdown)
    if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(html)
    console.warn('DOMPurify not loaded — using fallback sanitizer. Run setup.sh to fix this.')
    return html.replace(/<script[\s\S]*?<\/script>/gi, '')
               .replace(/\son\w+\s*=\s*["'][^"']*["']/gi, '')
  }

  async function loadPastContext() {
    try {
      const res = await fetch(`${API}/context`)
      const data = await res.json()
      pastContext = data.context || ''
    } catch {
      pastContext = ''
    }
  }
  loadPastContext()

  function setMode(mode, skillPrompt = '') {
    currentMode = mode
    currentSkillPrompt = skillPrompt
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.toggle('active', p.dataset.mode === mode))
  }

  // ── Model switching ──────────────────────────────────────
  let libraryModels = []

  async function loadModels() {
    try {
      const res = await fetch(`${API}/models`)
      const data = await res.json()
      renderModelPicker(data.models || [])
    } catch {}
  }

  async function loadLibrary() {
    try {
      const res  = await fetch(`${API}/library`)
      const data = await res.json()
      libraryModels = data.models || []
    } catch {}
  }

  function renderModelPicker(installed) {
    const picker   = document.getElementById('modelPicker')
    const nameEl   = document.getElementById('modelName')
    const dropdown = document.getElementById('modelDropdown')
    const wasOpen  = dropdown.classList.contains('open')

    if (!currentModel && installed.length) currentModel = installed[0]
    if (currentModel) nameEl.textContent = currentModel.replace(/:latest$/, '')

    dropdown.innerHTML = ''

    // ── Installed ──
    if (installed.length) {
      const lbl = document.createElement('div'); lbl.className = 'model-section-label'; lbl.textContent = 'Installed'
      dropdown.appendChild(lbl)
      installed.forEach(m => {
        const opt = document.createElement('div')
        opt.className = 'model-option' + (m === currentModel ? ' active' : '')
        opt.textContent = m
        opt.addEventListener('click', e => {
          e.stopPropagation()
          currentModel = m
          nameEl.textContent = m.replace(/:latest$/, '')
          dropdown.querySelectorAll('.model-option').forEach(o => o.classList.toggle('active', o.textContent === m))
          dropdown.classList.remove('open'); picker.classList.remove('active')
        })
        dropdown.appendChild(opt)
      })
    }

    // ── Pull by name ──
    const div1 = document.createElement('div'); div1.className = 'model-section-divider'; dropdown.appendChild(div1)
    const pullLbl = document.createElement('div'); pullLbl.className = 'model-section-label'; pullLbl.textContent = 'Pull a model'
    dropdown.appendChild(pullLbl)
    const pullRow   = document.createElement('div'); pullRow.className = 'model-pull-row'
    const pullInput = document.createElement('input')
    pullInput.className = 'model-pull-input'; pullInput.placeholder = 'name or name:tag'
    pullInput.addEventListener('click', e => e.stopPropagation())
    pullInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); pullModel(pullInput.value.trim(), null, pullInput) } })
    const pullBtn = document.createElement('button'); pullBtn.className = 'model-pull-btn'; pullBtn.textContent = 'Pull'
    pullBtn.addEventListener('click', e => { e.stopPropagation(); pullModel(pullInput.value.trim(), null, pullInput) })
    pullRow.appendChild(pullInput); pullRow.appendChild(pullBtn); dropdown.appendChild(pullRow)

    // ── Browse popular ──
    if (libraryModels.length) {
      const div2 = document.createElement('div'); div2.className = 'model-section-divider'; dropdown.appendChild(div2)
      const installedSet = new Set(installed.flatMap(m => [m, m.replace(/:latest$/, '')]))

      let browseOpen = false
      const browseToggle = document.createElement('div'); browseToggle.className = 'model-browse-toggle'
      browseToggle.innerHTML = `<span>Browse popular</span><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      const libraryEl = document.createElement('div'); libraryEl.className = 'model-library'; libraryEl.style.display = 'none'

      browseToggle.addEventListener('click', e => {
        e.stopPropagation()
        browseOpen = !browseOpen
        libraryEl.style.display = browseOpen ? 'block' : 'none'
        browseToggle.querySelector('svg').style.transform = browseOpen ? 'rotate(180deg)' : ''
      })
      dropdown.appendChild(browseToggle)

      libraryModels.forEach(model => {
        const isInstalled = installedSet.has(model.name)
        const item = document.createElement('div'); item.className = 'model-library-item'
        item.innerHTML = `
          <div class="model-library-info">
            <div class="model-library-name">${model.name}</div>
            <div class="model-library-desc">${model.description}</div>
          </div>
          <div class="model-library-size">${model.size}</div>
          <button class="model-library-pull-btn" title="${isInstalled ? 'Installed' : 'Pull'}" ${isInstalled ? 'disabled' : ''}>${isInstalled ? '✓' : '↓'}</button>
        `
        if (!isInstalled) {
          item.querySelector('.model-library-pull-btn').addEventListener('click', e => {
            e.stopPropagation(); pullModel(model.name, item)
          })
        }
        libraryEl.appendChild(item)
      })
      dropdown.appendChild(libraryEl)
    }

    // ── Progress ──
    const prog = document.createElement('div'); prog.className = 'model-pull-progress'; prog.id = 'pullProgress'; prog.style.display = 'none'
    prog.innerHTML = `<div class="model-pull-status" id="pullStatus"></div><div class="model-pull-bar"><div class="model-pull-bar-fill" id="pullBarFill"></div></div>`
    dropdown.appendChild(prog)

    picker.style.display = 'flex'
    if (wasOpen) dropdown.classList.add('open')
  }

  async function pullModel(name, itemEl, inputEl) {
    if (!name) return
    const progressEl = document.getElementById('pullProgress')
    const statusEl   = document.getElementById('pullStatus')
    const barFill    = document.getElementById('pullBarFill')
    if (!progressEl || !statusEl || !barFill) return

    progressEl.style.display = 'block'
    statusEl.textContent = `Pulling ${name}…`
    barFill.style.width = '0%'
    if (itemEl) itemEl.classList.add('pulling')
    if (inputEl) inputEl.disabled = true

    try {
      const res = await fetch(`${API}/pull`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      })
      const reader = res.body.getReader(); const decoder = new TextDecoder()
      while (true) {
        const { done, value } = await reader.read(); if (done) break
        const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '))
        for (const line of lines) {
          const raw = line.slice(6); if (raw === '[DONE]') break
          try {
            const json = JSON.parse(raw)
            if (json.error) { statusEl.textContent = `Error: ${json.error}`; return }
            if (json.total && json.completed) {
              const pct = Math.round((json.completed / json.total) * 100)
              barFill.style.width = pct + '%'
              statusEl.textContent = `${json.status} — ${pct}%`
            } else if (json.status) {
              statusEl.textContent = json.status
            }
            if (json.status === 'success') {
              barFill.style.width = '100%'
              statusEl.textContent = `${name} ready ✓`
              if (itemEl) {
                const btn = itemEl.querySelector('.model-library-pull-btn')
                if (btn) { btn.textContent = '✓'; btn.disabled = true }
              }
              setTimeout(async () => {
                await loadModels()
                const prog = document.getElementById('pullProgress')
                if (prog) prog.style.display = 'none'
              }, 1200)
            }
          } catch {}
        }
      }
    } catch {
      if (statusEl) statusEl.textContent = 'Pull failed — is Ollama running?'
    } finally {
      if (inputEl) { inputEl.disabled = false; inputEl.value = '' }
      if (itemEl) itemEl.classList.remove('pulling')
    }
  }

  async function deleteNote(filename, el, onSuccess) {
    if (!confirm('Delete this note?')) return
    try {

    } catch { alert('Could not delete') }

  async function renameNote(filename, newTitle, onSuccess) {
    const name = filename.split('/').pop().replace('.md', '')
    const dateMatch = name.match(/^(\d{4}-\d{2}-\d{2}\s+\d{2}-\d{2}\s+)/)
    const prefix = dateMatch ? dateMatch[1] : ''
    const folder = filename.includes('/') ? filename.substring(0, filename.lastIndexOf('/') + 1) : ''
    const safe = newTitle.replace(/[\\/:*?"<>|#^[\]]/g, '').trim()
    if (!safe) return
    const newFilename = folder + prefix + safe + '.md'
    try {
      const res = await fetch(`${API}/rename`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: filename, to: newFilename })
      })
      if (!res.ok) throw new Error()
      if (sessionFilename === filename) sessionFilename = newFilename
      if (canvasState.positions[filename]) {
        canvasState.positions[newFilename] = canvasState.positions[filename]
        delete canvasState.positions[filename]
        canvasState.connections = canvasState.connections.map(c => ({
          from: c.from === filename ? newFilename : c.from,
          to: c.to === filename ? newFilename : c.to
        }))
        saveCanvasState()
      }
      if (onSuccess) onSuccess(newFilename)
    } catch { alert('Could not rename') }
  }

  function startInlineRename(titleEl, currentTitle, onConfirm) {
    const input = document.createElement('input')
    input.className = 'rename-input'
    input.value = currentTitle
    titleEl.replaceWith(input)
    input.focus(); input.select()
    let done = false
    function finish() {
      if (done) return; done = true
      const val = input.value.trim()
      if (val && val !== currentTitle) { onConfirm(val, () => input.replaceWith(titleEl)) }
      else { input.replaceWith(titleEl) }
    }
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); finish() }
      if (e.key === 'Escape') { done = true; input.replaceWith(titleEl) }
    })
    input.addEventListener('blur', finish)
  }

  let rotationY = 0, isDragging = false, dragStartX = 0, dragStartRot = 0

  function buildCarousel(notes) {
    const ring = document.getElementById('carouselRing')
    if (!notes.length) { ring.innerHTML = '<div class="carousel-empty">No notes yet</div>'; return }
    const count = notes.length
    const radius = Math.max(200, count * 30)
    ring.innerHTML = ''
    notes.forEach((filename, i) => {
      const angle = (360 / count) * i
      const name = filename.split('/').pop().replace('.md', '')
      const datePart = name.slice(0, 10)
      const preview = name.slice(11).replace(/-/g, ' ') || name
      const card = document.createElement('div')
      card.className = 'carousel-card'
      card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`
      card.innerHTML = `<div class="card-date">${datePart}</div><div class="card-preview">${preview}</div><button class="card-delete" title="Delete">✕</button>`
      card.querySelector('.card-delete').addEventListener('click', async e => {
        e.stopPropagation()
        try {
          await fetch(`${API}/note?path=${encodeURIComponent(filename)}`, { method: 'DELETE' })
          card.style.transition = 'opacity 0.2s'; card.style.opacity = '0'
          setTimeout(() => loadGallery(), 250)
        } catch { alert('Could not delete note') }
      })
      card.addEventListener('click', () => loadSession(filename))
      ring.appendChild(card)
    })
    updateRing()
    const scene = document.getElementById('carouselScene')
    scene.onmousedown = e => { isDragging=true;dragStartX=e.clientX;dragStartRot=rotationY;velocity=0;lastX=e.clientX;lastTime=Date.now();if(rafId)cancelAnimationFrame(rafId) }
    scene.ontouchstart = e => { const t=e.touches[0];isDragging=true;dragStartX=t.clientX;dragStartRot=rotationY;velocity=0;lastX=t.clientX;lastTime=Date.now();if(rafId)cancelAnimationFrame(rafId) }
    window.onmousemove = e => { if(!isDragging)return;rotationY=dragStartRot+(e.clientX-dragStartX)*0.4;const now=Date.now();velocity=((e.clientX-lastX)/(now-lastTime||1))*16;lastX=e.clientX;lastTime=now;updateRing() }
    window.ontouchmove = e => { const t=e.touches[0];if(!isDragging)return;rotationY=dragStartRot+(t.clientX-dragStartX)*0.4;const now=Date.now();velocity=((t.clientX-lastX)/(now-lastTime||1))*16;lastX=t.clientX;lastTime=now;updateRing() }
    window.onmouseup = window.ontouchend = () => { if(!isDragging)return;isDragging=false;momentumRing() }
  }

  function updateRing() { document.getElementById('carouselRing').style.transform = `rotateY(${rotationY}deg)` }
  function momentumRing() { if(Math.abs(velocity)<0.2)return;velocity*=0.95;rotationY+=velocity;updateRing();rafId=requestAnimationFrame(momentumRing) }

  function attachCardDrag(card, filename) {
    let dragging = false, startX, startY, startLeft, startTop, moved

    card.addEventListener('mousedown', e => {
      if (e.target.closest('.canvas-card-open')) return
      if (connectMode) return
      e.stopPropagation()
      dragging = true; moved = false
      startX = e.clientX; startY = e.clientY
      startLeft = canvasState.positions[filename].x
      startTop = canvasState.positions[filename].y
      card.classList.add('dragging')
    })

    window.addEventListener('mousemove', e => {
      if (!dragging) return
      const dx = (e.clientX - startX) / canvasState.scale
      const dy = (e.clientY - startY) / canvasState.scale
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true
      const nx = startLeft + dx, ny = startTop + dy
      canvasState.positions[filename] = { x: nx, y: ny }
      card.style.left = nx + 'px'
      card.style.top = ny + 'px'
      drawConnections()
    })

    window.addEventListener('mouseup', () => {
      if (!dragging) return
      dragging = false
      card.classList.remove('dragging')
      if (moved) saveCanvasState()
    })
  }

  // Canvas pan & zoom
  function initCanvasPanZoom() {
    const overlay = document.getElementById('canvasOverlay')
    const world = document.getElementById('canvasWorld')
    let panning = false, panStartX, panStartY, panStartPanX, panStartPanY

    world.addEventListener('mousedown', e => {
      if (e.target !== world && e.target !== document.getElementById('canvasSvg')) return
      if (connectMode) return
      panning = true
      panStartX = e.clientX; panStartY = e.clientY
      panStartPanX = canvasState.pan.x; panStartPanY = canvasState.pan.y
      world.classList.add('panning')
    })

    window.addEventListener('mousemove', e => {
      if (!panning) return
      canvasState.pan.x = panStartPanX + (e.clientX - panStartX)
      canvasState.pan.y = panStartPanY + (e.clientY - panStartY)
      applyWorldTransform()
    })

    window.addEventListener('mouseup', () => {
      if (!panning) return
      panning = false
      world.classList.remove('panning')
      saveCanvasState()
    })

    overlay.addEventListener('wheel', e => {
      e.preventDefault()
      const rect = overlay.getBoundingClientRect()
      const mouseX = e.clientX - rect.left
      const mouseY = e.clientY - rect.top
      const delta = e.deltaY < 0 ? 1.1 : 0.91
      const newScale = Math.max(0.2, Math.min(3, canvasState.scale * delta))
      const worldX = (mouseX - canvasState.pan.x) / canvasState.scale
      const worldY = (mouseY - canvasState.pan.y) / canvasState.scale
      canvasState.scale = newScale
      canvasState.pan.x = mouseX - worldX * newScale
      canvasState.pan.y = mouseY - worldY * newScale
      applyWorldTransform()
    }, { passive: false })
  }

  function applyWorldTransform() {
    const world = document.getElementById('canvasWorld')
    world.style.transform = `translate(${canvasState.pan.x}px, ${canvasState.pan.y}px) scale(${canvasState.scale})`
    // Dot grid tracks pan + zoom
    const overlay = document.getElementById('canvasOverlay')
    const size = 24 * canvasState.scale
    overlay.style.backgroundSize = `${size}px ${size}px`
    overlay.style.backgroundPosition = `${canvasState.pan.x % size}px ${canvasState.pan.y % size}px`
  }

  function fitCanvasView() {
    const overlay = document.getElementById('canvasOverlay')
    const filenames = Object.keys(canvasState.positions)
    if (!filenames.length) return

    const W = overlay.clientWidth, H = overlay.clientHeight - 64
    const xs = filenames.map(f => canvasState.positions[f].x)
    const ys = filenames.map(f => canvasState.positions[f].y)
    const minX = Math.min(...xs), minY = Math.min(...ys)
    const maxX = Math.max(...xs) + CARD_W, maxY = Math.max(...ys) + CARD_H
    const cw = maxX - minX + 80, ch = maxY - minY + 80
    const scale = Math.min(W / cw, H / ch, 1)
    canvasState.scale = scale
    canvasState.pan = {
      x: (W - cw * scale) / 2 - minX * scale + 40 * scale,
      y: (H - ch * scale) / 2 - minY * scale + 40 * scale + 32
    }
    applyWorldTransform()
  }

  // Connect mode
  function toggleConnectMode() {
    connectMode = !connectMode
    const btn = document.getElementById('connectBtn')
    const world = document.getElementById('canvasWorld')
    btn.classList.toggle('active', connectMode)
    world.classList.toggle('connecting', connectMode)
    if (!connectMode) exitConnectMode()
  }

  function exitConnectMode() {
    connectMode = false
    connectSource = null
    document.getElementById('connectBtn')?.classList.remove('active')
    document.getElementById('canvasWorld')?.classList.remove('connecting')
    document.querySelectorAll('.canvas-card').forEach(c => c.classList.remove('connect-source'))
  }

  function handleConnectClick(filename, card) {
    if (!connectSource) {
      connectSource = filename
      document.querySelectorAll('.canvas-card').forEach(c => c.classList.remove('connect-source'))
      card.classList.add('connect-source')
    } else if (connectSource === filename) {
      connectSource = null
      card.classList.remove('connect-source')
    } else {
      // Add connection if not duplicate
      const exists = canvasState.connections.some(
        c => (c.from === connectSource && c.to === filename) || (c.from === filename && c.to === connectSource)
      )
      if (!exists) {
        canvasState.connections.push({ from: connectSource, to: filename })
        saveCanvasState()
        drawConnections()
      }
      connectSource = null
      document.querySelectorAll('.canvas-card').forEach(c => c.classList.remove('connect-source'))
    }
  }

  function drawConnections() {
    const svg = document.getElementById('canvasSvg')
    svg.innerHTML = ''

    canvasState.connections.forEach(({ from, to }) => {
      const p1 = canvasState.positions[from]
      const p2 = canvasState.positions[to]
      if (!p1 || !p2) return

      const x1 = p1.x + CARD_W / 2, y1 = p1.y + CARD_H / 2
      const x2 = p2.x + CARD_W / 2, y2 = p2.y + CARD_H / 2
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2

      // Bezier path
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path')
      path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`)
      path.setAttribute('stroke', 'rgba(255,87,87,0.35)')
      path.setAttribute('stroke-width', '1.5')
      path.setAttribute('stroke-dasharray', '5 4')
      path.setAttribute('fill', 'none')
      svg.appendChild(path)

      // Delete button at midpoint
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')
      g.setAttribute('class', 'conn-delete')

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
      circle.setAttribute('cx', mx); circle.setAttribute('cy', my); circle.setAttribute('r', '9')
      circle.setAttribute('fill', 'rgba(255,254,248,0.9)')
      circle.setAttribute('stroke', 'rgba(255,87,87,0.35)'); circle.setAttribute('stroke-width', '1')

      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text')
      txt.setAttribute('x', mx); txt.setAttribute('y', my + 3.5)
      txt.setAttribute('text-anchor', 'middle')
      txt.setAttribute('fill', 'rgba(255,87,87,0.7)')
      txt.setAttribute('font-size', '9')
      txt.setAttribute('font-family', 'system-ui,sans-serif')
      txt.textContent = '✕'

      g.appendChild(circle); g.appendChild(txt)
      g.addEventListener('click', e => {
        e.stopPropagation()
        canvasState.connections = canvasState.connections.filter(c => !(c.from === from && c.to === to))
        saveCanvasState(); drawConnections()
      })
      svg.appendChild(g)
    })
  }

  initCanvasPanZoom()

  // ─────────────────────────────────────────────
  // Chat
  // ─────────────────────────────────────────────
  let abortController = null

  function setGenerating(on) {
    const btn = document.getElementById('sendBtn')
    if (on) {
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="2.5" fill="white"/></svg>`
      btn.onclick = stopGeneration
      btn.disabled = false
    } else {
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 13V3M3 8l5-5 5 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      btn.onclick = sendPrompt
      btn.disabled = false
    }
  }

  function stopGeneration() {
    if (abortController) abortController.abort()
  }

  async function sendPrompt() {
    const input = document.getElementById('promptInput')
    const prompt = input.value.trim()
    if (!prompt) return
    lastPrompt = prompt; input.value = ''; autoResize(input)
    document.getElementById('welcome')?.remove()
    setGenerating(true)
    appendMessage('user', prompt)
    const thinking = appendThinking()

    abortController = new AbortController()
    let streamStarted = false
    let fullResponse = ''

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, history: conversationHistory, mode: currentMode, context: pastContext, model: currentModel, customPrompt: currentSkillPrompt }),
        signal: abortController.signal
      })

      thinking.remove()
      streamStarted = true

      const container = document.getElementById('messages')
      const wrap = document.createElement('div'); wrap.className = 'message assistant'
      const label = document.createElement('div'); label.className = 'msg-label'
      const modeLabel = currentSkillPrompt
        ? `sunday · ${currentMode.toLowerCase()}`
        : (currentMode !== 'free' ? `sunday · ${currentMode}` : 'sunday')
      label.textContent = modeLabel
      const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = ''
      wrap.appendChild(label); wrap.appendChild(bubble)
      container.appendChild(wrap)

      const reader = res.body.getReader()
      const decoder = new TextDecoder()

      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        const text = decoder.decode(value)
        const lines = text.split('\n').filter(l => l.startsWith('data: '))
        for (const line of lines) {
          const data = line.slice(6)
          if (data === '[DONE]') break
          try {
            const json = JSON.parse(data)
            if (json.token) {
              fullResponse += json.token
              bubble.innerHTML = safeHtml(fullResponse)
              const chatArea = document.getElementById('chatArea')
              chatArea.scrollTop = chatArea.scrollHeight
            }
          } catch {}
        }
      }

      lastResponse = fullResponse
      conversationHistory.push({ role: 'user', content: prompt })
      conversationHistory.push({ role: 'assistant', content: fullResponse })
      saveConversation()
      loadPastContext()

    } catch (err) {
      if (err.name === 'AbortError') {
        // User stopped generation — remove thinking if stream hadn't started yet
        if (!streamStarted) thinking.remove()
        // Keep whatever was streamed
        if (fullResponse) {
          lastResponse = fullResponse
          conversationHistory.push({ role: 'user', content: prompt })
          conversationHistory.push({ role: 'assistant', content: fullResponse })
          saveConversation()
        }
      } else {
        if (!streamStarted) thinking.remove()
        appendMessage('assistant', 'Could not reach Sunday. Is the server running?', false)
      }
    } finally {
      abortController = null
      setGenerating(false)
      input.focus()
    }
  }

  function appendMessage(role, text, showSave=false, scroll=true) {
    const container = document.getElementById('messages')
    const wrap = document.createElement('div'); wrap.className=`message ${role}`
    const label = document.createElement('div'); label.className='msg-label'; label.textContent=role==='user'?'you':'sunday'
    const bubble = document.createElement('div'); bubble.className='bubble'
    if (role === 'assistant') { bubble.innerHTML = safeHtml(text) } else { bubble.textContent = text }
    wrap.appendChild(label); wrap.appendChild(bubble)
    if (showSave) {
      const row = document.createElement('div'); row.className='save-row'
      const tagField = document.createElement('input'); tagField.className='tag-field'; tagField.placeholder='tags (e.g. idea, code)'; tagField.type='text'
      const btn = document.createElement('button'); btn.className='save-btn'; btn.textContent='Save to Obsidian'
      btn.onclick = () => saveNote(tagField.value, btn)
      row.appendChild(tagField); row.appendChild(btn); wrap.appendChild(row)
    }
    container.appendChild(wrap)
    if (scroll) {
      const chatArea = document.getElementById('chatArea')
      setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight }, 0)
    }
  }

  function appendThinking() {
    const container = document.getElementById('messages')
    const el = document.createElement('div'); el.className='thinking'
    el.innerHTML=`Sunday is thinking <div class="dots"><span></span><span></span><span></span></div>`
    container.appendChild(el)
    const chatArea = document.getElementById('chatArea')
    setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight }, 0)
    return el
  }

  async function saveNote(tags, btn) {
    btn.textContent='Saving…'; btn.disabled=true
    try {
      await fetch(`${API}/save`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt:lastPrompt,response:lastResponse,tags}) })
      btn.textContent='Saved ✓'; btn.className='save-btn saved'
    } catch { btn.textContent='Failed — retry'; btn.disabled=false }
  }

  function saveConversation() {
    if (!conversationHistory.length) return
    if (!sessionFilename) {
      const date = new Date().toISOString().slice(0, 10)
      const time = new Date().toTimeString().slice(0, 5).replace(':', '-')
      const title = conversationHistory[0].content.slice(0, 40).replace(/[\\/:*?"<>|#^[\]]/g, '').trim()
      sessionFilename = `${date} ${time} ${title}.md`
    }
    const content = conversationHistory.map(m =>
      `## ${m.role === 'user' ? 'You' : 'Sunday'}\n${m.content}`
    ).join('\n\n')
    fetch(`${API}/save`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ prompt: sessionFilename, response: content, tags: 'brain' }) })
  }

  function newChat() {
    saveConversation()
    sessionFilename = null
    conversationHistory = []
    lastPrompt = ''; lastResponse = ''
    const chatArea = document.getElementById('chatArea')
    chatArea.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-greeting">Good <span id="timeGreeting"></span></div>
        <div class="welcome-sub">What's on your mind today?</div>
        <div class="suggestions">
          <button class="suggestion glass" onclick="fillPrompt('Give me an unexpected angle on an idea I\'m stuck on')">Unstick an idea</button>
          <button class="suggestion glass" onclick="fillPrompt('What creative project should I start this week?')">Weekend creative project</button>
          <button class="suggestion glass" onclick="fillPrompt('Challenge an assumption I probably have about my work')">Challenge an assumption</button>
          <button class="suggestion glass" onclick="fillPrompt('What\'s a concept worth understanding deeply right now?')">Something worth learning</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>`
    const hour = new Date().getHours()
    document.getElementById('timeGreeting').textContent = hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening'
    document.getElementById('promptInput').focus()
  }

  window.addEventListener('beforeunload', saveConversation)

  async function checkStatus() {
    const dot  = document.getElementById('statusDot')
    const text = document.getElementById('statusText')
    try {
      await fetch(`${API}/notes`)
      dot.classList.remove('offline'); dot.classList.add('online')
      text.textContent = 'Connected'
    } catch {
      dot.classList.remove('online'); dot.classList.add('offline')
      text.textContent = 'Offline'
    }
    // Expand dot → pill
    dot.classList.add('expanded')
    // Collapse back to dot after 2.6s
    setTimeout(() => dot.classList.remove('expanded'), 2600)
  }
  checkStatus()
</script>
